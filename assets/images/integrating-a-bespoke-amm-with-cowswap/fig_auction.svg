<svg width="100%" viewBox="0 70 1120 532" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">
<title>The atomic settlement call stack</title>
<desc>A stack trace of the single transaction the winning solver runs. The CoW flash-loan router borrows USD from Morpho and hands control to the Morpho borrower's onMorphoFlashLoan callback; the CoW settlement then runs inside that loan, its pre-hook draws the borrowed USD and swaps it for BTC on the vault, ERC-1271 validates the AMM order and CoW delivers BTC, and finally Morpho pulls back the principal with the surplus swept to the vault. Indentation is the call depth; everything runs in one transaction and reverts together.</desc>

<defs>
  <style><![CDATA[
    .code { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    .hl { opacity: 0; }
    .hl0{animation:sweep 10s ease-in-out infinite;animation-delay:0s}
    .hl1{animation:sweep 10s ease-in-out infinite;animation-delay:.8s}
    .hl2{animation:sweep 10s ease-in-out infinite;animation-delay:1.6s}
    .hl3{animation:sweep 10s ease-in-out infinite;animation-delay:2.4s}
    .hl4{animation:sweep 10s ease-in-out infinite;animation-delay:3.2s}
    .hl5{animation:sweep 10s ease-in-out infinite;animation-delay:4.0s}
    .hl6{animation:sweep 10s ease-in-out infinite;animation-delay:4.8s}
    .hl7{animation:sweep 10s ease-in-out infinite;animation-delay:5.6s}
    .hl8{animation:sweep 10s ease-in-out infinite;animation-delay:6.4s}
    .hl9{animation:sweep 10s ease-in-out infinite;animation-delay:7.2s}
    @keyframes sweep { 0%{opacity:0} 2%{opacity:.5} 8%{opacity:.5} 12%{opacity:0} 100%{opacity:0} }
    @media (prefers-reduced-motion: reduce){ .hl{animation:none;opacity:0} }
    text{ fill:#6b5a44; }
  ]]></style>
</defs>

<rect x="0" y="0" width="1120" height="640" fill="#fdf8f1"/>

<text x="72" y="132" font-size="24" font-weight="700">Atomic settlement</text>

<!-- Scope of the flash-loan callback: everything inside onMorphoFlashLoan -->
<rect x="192" y="323" width="848" height="262" rx="12" fill="#f7f0e2"/>
<line x1="195" y1="330" x2="195" y2="578" stroke="#7d8a34" stroke-width="3" stroke-linecap="round" opacity=".32"/>

<!-- 0: FlashLoanRouter.flashLoanAndSettle() -->
<g>
  <rect x="72" y="158" width="968" height="33" rx="7" fill="#fdf6ea" stroke="#e7d6ba" stroke-width="1.4"/>
  <rect class="hl hl0" x="72" y="158" width="968" height="33" rx="7" fill="#f2d6a6"/>
  <rect x="79" y="165" width="4" height="19" rx="2" fill="#c99a5e"/>
  <text class="code" x="92" y="180" font-size="16" fill="#5a4a36">FlashLoanRouter.flashLoanAndSettle()</text>
  <text x="1024" y="179" text-anchor="end" font-size="12.5" fill="#b79a72">solver's entry point</text>
</g>
<!-- 1: MorphoFlashLoanRouter.flashLoanAndCallBack() -->
<g>
  <rect x="112" y="201" width="928" height="33" rx="7" fill="#fdf6ea" stroke="#e7d6ba" stroke-width="1.4"/>
  <rect class="hl hl1" x="112" y="201" width="928" height="33" rx="7" fill="#f2d6a6"/>
  <rect x="119" y="208" width="4" height="19" rx="2" fill="#7d8a34"/>
  <text class="code" x="132" y="223" font-size="16" fill="#5a4a36">MorphoFlashLoanRouter.flashLoanAndCallBack()</text>
  <text x="1024" y="222" text-anchor="end" font-size="12.5" fill="#b79a72">our Morpho borrower</text>
</g>
<!-- 2: Morpho.flashLoan(USD) -->
<g>
  <rect x="152" y="244" width="888" height="33" rx="7" fill="#fdf6ea" stroke="#e7d6ba" stroke-width="1.4"/>
  <rect class="hl hl2" x="152" y="244" width="888" height="33" rx="7" fill="#f2d6a6"/>
  <rect x="159" y="251" width="4" height="19" rx="2" fill="#c26a1f"/>
  <text class="code" x="172" y="266" font-size="16" fill="#5a4a36">Morpho.flashLoan(USD)</text>
  <text x="1024" y="265" text-anchor="end" font-size="12.5" fill="#b79a72">borrow the counter-leg</text>
</g>
<!-- 3: MorphoFlashLoanRouter.onMorphoFlashLoan() -->
<g>
  <rect x="192" y="287" width="848" height="33" rx="7" fill="#fdf6ea" stroke="#e7d6ba" stroke-width="1.4"/>
  <rect class="hl hl3" x="192" y="287" width="848" height="33" rx="7" fill="#f2d6a6"/>
  <rect x="199" y="294" width="4" height="19" rx="2" fill="#7d8a34"/>
  <text class="code" x="212" y="309" font-size="16" fill="#5a4a36">MorphoFlashLoanRouter.onMorphoFlashLoan()</text>
  <text x="1024" y="308" text-anchor="end" font-size="12.5" fill="#b79a72">loan now in hand</text>
</g>
<!-- 4: GPv2Settlement.settle(batch) -->
<g>
  <rect x="232" y="330" width="808" height="33" rx="7" fill="#fdf6ea" stroke="#e7d6ba" stroke-width="1.4"/>
  <rect class="hl hl4" x="232" y="330" width="808" height="33" rx="7" fill="#f2d6a6"/>
  <rect x="239" y="337" width="4" height="19" rx="2" fill="#c99a5e"/>
  <text class="code" x="252" y="352" font-size="16" fill="#5a4a36">GPv2Settlement.settle(batch)</text>
  <text x="1024" y="351" text-anchor="end" font-size="12.5" fill="#b79a72">the batch settles, inside the loan</text>
</g>
<!-- 5: AmmCowSwapper.provideInventory() -->
<g>
  <rect x="272" y="373" width="768" height="33" rx="7" fill="#fdf6ea" stroke="#e7d6ba" stroke-width="1.4"/>
  <rect class="hl hl5" x="272" y="373" width="768" height="33" rx="7" fill="#f2d6a6"/>
  <rect x="279" y="380" width="4" height="19" rx="2" fill="#7d8a34"/>
  <text class="code" x="292" y="395" font-size="16" fill="#5a4a36">AmmCowSwapper.provideInventory()</text>
  <text x="1024" y="394" text-anchor="end" font-size="12.5" fill="#b79a72">pre-hook</text>
</g>
<!-- 6: MorphoFlashLoanRouter.takeLoan(USD) -->
<g>
  <rect x="312" y="416" width="728" height="33" rx="7" fill="#fdf6ea" stroke="#e7d6ba" stroke-width="1.4"/>
  <rect class="hl hl6" x="312" y="416" width="728" height="33" rx="7" fill="#f2d6a6"/>
  <rect x="319" y="423" width="4" height="19" rx="2" fill="#7d8a34"/>
  <text class="code" x="332" y="438" font-size="16" fill="#5a4a36">MorphoFlashLoanRouter.takeLoan(USD)</text>
  <text x="1024" y="437" text-anchor="end" font-size="12.5" fill="#b79a72">draw the borrowed USD</text>
</g>
<!-- 7: Amm.swap(USD &#8594; BTC) -->
<g>
  <rect x="312" y="459" width="728" height="33" rx="7" fill="#fdf6ea" stroke="#e7d6ba" stroke-width="1.4"/>
  <rect class="hl hl7" x="312" y="459" width="728" height="33" rx="7" fill="#f2d6a6"/>
  <rect x="319" y="466" width="4" height="19" rx="2" fill="#c26a1f"/>
  <text class="code" x="332" y="481" font-size="16" fill="#5a4a36">Amm.swap(USD &#8594; BTC)</text>
  <text x="1024" y="480" text-anchor="end" font-size="12.5" fill="#b79a72">fill from the AMM</text>
</g>
<!-- 8: AmmCowSwapper.isValidSignature() -->
<g>
  <rect x="272" y="502" width="768" height="33" rx="7" fill="#fdf6ea" stroke="#e7d6ba" stroke-width="1.4"/>
  <rect class="hl hl8" x="272" y="502" width="768" height="33" rx="7" fill="#f2d6a6"/>
  <rect x="279" y="509" width="4" height="19" rx="2" fill="#7d8a34"/>
  <text class="code" x="292" y="524" font-size="16" fill="#5a4a36">AmmCowSwapper.isValidSignature()</text>
  <text x="1024" y="523" text-anchor="end" font-size="12.5" fill="#b79a72">ERC-1271 · CoW delivers BTC</text>
</g>
<!-- 9: Morpho pulls USD -->
<g>
  <rect x="232" y="545" width="808" height="33" rx="7" fill="#fdf6ea" stroke="#e7d6ba" stroke-width="1.4"/>
  <rect class="hl hl9" x="232" y="545" width="808" height="33" rx="7" fill="#f2d6a6"/>
  <rect x="239" y="552" width="4" height="19" rx="2" fill="#c26a1f"/>
  <text class="code" x="252" y="567" font-size="16" fill="#5a4a36">Morpho pulls USD</text>
  <text x="1024" y="566" text-anchor="end" font-size="12.5" fill="#b79a72">principal repaid · surplus → vault</text>
</g>
</svg>

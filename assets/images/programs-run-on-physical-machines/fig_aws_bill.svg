<svg viewBox="0 0 520 320" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif" style="max-width:520px; width:100%; height:auto; overflow:visible;">
  <title>AWS monthly bill</title>
  <desc>Stacked bar chart: stable around 500 dollars from January to June across EC2, RDS, and S3, then jumping to 2000 dollars in July after hardware retirement, with a large new maintenance cost.</desc>
  <style>
    @keyframes revealUp {
      from { clip-path: inset(100% 0 0 0); }
      to { clip-path: inset(0 0 0 0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes spikeReveal {
      from { clip-path: inset(100% 0 0 0); }
      to { clip-path: inset(0 0 0 0); }
    }
    .bar { clip-path: inset(100% 0 0 0); animation: revealUp 0.6s ease-out forwards; }
    .spike { clip-path: inset(100% 0 0 0); animation: spikeReveal 0.4s ease-out forwards; }
    .fade { opacity: 0; animation: fadeIn 0.4s ease-out forwards; }
    .b1 { animation-delay: 0.8s; }
    .b2 { animation-delay: 1.3s; }
    .b3 { animation-delay: 1.8s; }
    .b4 { animation-delay: 2.3s; }
    .b5 { animation-delay: 2.8s; }
    .b6 { animation-delay: 3.3s; }
    .retire { animation-delay: 3.8s; }
    .b7 { animation-delay: 4.4s; }
    .b7s { animation-delay: 5s; }
    .b8 { animation-delay: 5.5s; }
    .b8s { animation-delay: 6.1s; }
    .b9 { animation-delay: 6.6s; }
    .b9s { animation-delay: 7.2s; }
  </style>

  <!-- y-axis -->
  <line x1="60" y1="20" x2="60" y2="260" stroke="#94a3b8" stroke-width="1"/>
  <!-- x-axis -->
  <line x1="60" y1="260" x2="490" y2="260" stroke="#94a3b8" stroke-width="1"/>
  <!-- y-axis labels -->
  <text x="52" y="260" text-anchor="end" font-size="10" fill="#64748b">$0</text>
  <text x="52" y="210" text-anchor="end" font-size="10" fill="#64748b">$500</text>
  <text x="52" y="160" text-anchor="end" font-size="10" fill="#64748b">$1k</text>
  <text x="52" y="110" text-anchor="end" font-size="10" fill="#64748b">$1.5k</text>
  <text x="52" y="60" text-anchor="end" font-size="10" fill="#64748b">$2k</text>
  <!-- y gridlines -->
  <line x1="60" y1="210" x2="490" y2="210" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="60" y1="160" x2="490" y2="160" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="60" y1="110" x2="490" y2="110" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="60" y1="60" x2="490" y2="60" stroke="#e2e8f0" stroke-width="0.5"/>
  <!-- y-axis title -->
  <text x="16" y="145" font-size="11" fill="#475569" transform="rotate(-90 16 145)">AWS monthly bill</text>

  <!-- Jan -->
  <g class="bar b1">
    <rect x="72" y="252" width="36" height="8" fill="#86efac"/>
    <rect x="72" y="235" width="36" height="17" fill="#93c5fd"/>
    <rect x="72" y="210" width="36" height="25" fill="#fdba74"/>
  </g>
  <text x="90" y="275" text-anchor="middle" font-size="9" fill="#64748b" class="fade b1">Jan</text>

  <!-- Feb -->
  <g class="bar b2">
    <rect x="116" y="252" width="36" height="8" fill="#86efac"/>
    <rect x="116" y="235" width="36" height="17" fill="#93c5fd"/>
    <rect x="116" y="212" width="36" height="23" fill="#fdba74"/>
  </g>
  <text x="134" y="275" text-anchor="middle" font-size="9" fill="#64748b" class="fade b2">Feb</text>

  <!-- Mar -->
  <g class="bar b3">
    <rect x="160" y="252" width="36" height="8" fill="#86efac"/>
    <rect x="160" y="234" width="36" height="18" fill="#93c5fd"/>
    <rect x="160" y="209" width="36" height="25" fill="#fdba74"/>
  </g>
  <text x="178" y="275" text-anchor="middle" font-size="9" fill="#64748b" class="fade b3">Mar</text>

  <!-- Apr -->
  <g class="bar b4">
    <rect x="204" y="252" width="36" height="8" fill="#86efac"/>
    <rect x="204" y="236" width="36" height="16" fill="#93c5fd"/>
    <rect x="204" y="211" width="36" height="25" fill="#fdba74"/>
  </g>
  <text x="222" y="275" text-anchor="middle" font-size="9" fill="#64748b" class="fade b4">Apr</text>

  <!-- May -->
  <g class="bar b5">
    <rect x="248" y="251" width="36" height="9" fill="#86efac"/>
    <rect x="248" y="234" width="36" height="17" fill="#93c5fd"/>
    <rect x="248" y="208" width="36" height="26" fill="#fdba74"/>
  </g>
  <text x="266" y="275" text-anchor="middle" font-size="9" fill="#64748b" class="fade b5">May</text>

  <!-- Jun -->
  <g class="bar b6">
    <rect x="292" y="252" width="36" height="8" fill="#86efac"/>
    <rect x="292" y="235" width="36" height="17" fill="#93c5fd"/>
    <rect x="292" y="213" width="36" height="22" fill="#fdba74"/>
  </g>
  <text x="310" y="275" text-anchor="middle" font-size="9" fill="#64748b" class="fade b6">Jun</text>

  <!-- hardware retirement dashed line -->
  <g class="fade retire">
    <line x1="333" y1="25" x2="333" y2="260" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="336" y="35" font-size="9" fill="#dc2626" font-style="italic">hardware retired</text>
  </g>

  <!-- Jul (spike) -->
  <g class="bar b7">
    <rect x="340" y="252" width="36" height="8" fill="#86efac"/>
    <rect x="340" y="235" width="36" height="17" fill="#93c5fd"/>
    <rect x="340" y="210" width="36" height="25" fill="#fdba74"/>
  </g>
  <g class="spike b7s">
    <rect x="340" y="60" width="36" height="150" fill="#fca5a5"/>
  </g>
  <text x="358" y="275" text-anchor="middle" font-size="9" fill="#64748b" class="fade b7">Jul</text>

  <!-- Aug (spike) -->
  <g class="bar b8">
    <rect x="384" y="252" width="36" height="8" fill="#86efac"/>
    <rect x="384" y="236" width="36" height="16" fill="#93c5fd"/>
    <rect x="384" y="212" width="36" height="24" fill="#fdba74"/>
  </g>
  <g class="spike b8s">
    <rect x="384" y="62" width="36" height="150" fill="#fca5a5"/>
  </g>
  <text x="402" y="275" text-anchor="middle" font-size="9" fill="#64748b" class="fade b8">Aug</text>

  <!-- Sep (spike) -->
  <g class="bar b9">
    <rect x="428" y="251" width="36" height="9" fill="#86efac"/>
    <rect x="428" y="235" width="36" height="16" fill="#93c5fd"/>
    <rect x="428" y="211" width="36" height="24" fill="#fdba74"/>
  </g>
  <g class="spike b9s">
    <rect x="428" y="61" width="36" height="150" fill="#fca5a5"/>
  </g>
  <text x="446" y="275" text-anchor="middle" font-size="9" fill="#64748b" class="fade b9">Sep</text>

  <!-- Legend -->
  <g>
    <rect x="80" y="295" width="10" height="10" fill="#fdba74"/>
    <text x="94" y="304" font-size="10" fill="#64748b">EC2</text>
    <rect x="130" y="295" width="10" height="10" fill="#93c5fd"/>
    <text x="144" y="304" font-size="10" fill="#64748b">RDS</text>
    <rect x="180" y="295" width="10" height="10" fill="#86efac"/>
    <text x="194" y="304" font-size="10" fill="#64748b">S3</text>
    <rect x="224" y="295" width="10" height="10" fill="#fca5a5"/>
    <text x="238" y="304" font-size="10" fill="#64748b">maintenance</text>
  </g>
</svg>

<svg width="100%" viewBox="0 0 680 534" role="img" xmlns="http://www.w3.org/2000/svg" style="max-width:680px; height:auto; background: #f5f5f4; border: 1px solid rgba(222,220,209,0.3); border-radius: 12px; padding: 8px;">
  <title>Physical cascade of a single function call</title>
  <desc>add(a,b) flows through fetch, decode, stack, args, execute, return inside the silicon, then forks to heat radiating out through die, paste, sink, air and power drawn in through PSU, wall, grid, fuel, converging on long-term degradation: electromigration, hot carriers, capacitor wear, solder fatigue.</desc>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .anim { opacity: 0; animation: fadeIn 1.4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }
    .a0 { animation-delay: 1s; }
    .a1 { animation-delay: 2s; }
    .a2 { animation-delay: 1.6s; }
    .a3 { animation-delay: 2s; }
    .a4 { animation-delay: 2.4s; }
    .a5 { animation-delay: 2.8s; }
    .a6 { animation-delay: 3.2s; }
    .a7 { animation-delay: 3.6s; }
    .a8 { animation-delay: 4.2s; }
    .a9 { animation-delay: 5s; }
    .a10 { animation-delay: 5.8s; }
    .a11 { animation-delay: 6.8s; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- add(a,b) box -->
  <g class="anim a0">
    <rect x="260" y="20" width="160" height="40" rx="8" fill="#262624" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
    <text x="340" y="40" text-anchor="middle" dominant-baseline="central" font-family="ui-monospace, monospace" font-size="14" font-weight="500" fill="#FAF9F5">add(a, b)</text>
  </g>

  <!-- Arrow down -->
  <g class="anim a1">
    <line x1="340" y1="60" x2="340" y2="78" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Inside the silicon container -->
  <g class="anim a1">
    <rect x="40" y="80" width="600" height="110" rx="12" fill="#262624" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
    <text x="56" y="100" dominant-baseline="central" font-size="14" font-weight="500" fill="#FAF9F5" font-family="system-ui, sans-serif">Inside the silicon</text>
    <text x="56" y="118" dominant-baseline="central" font-size="12" fill="#C2C0B6" font-family="system-ui, sans-serif">picoseconds</text>
  </g>

  <!-- Fetch -->
  <g class="anim a2">
    <rect x="70" y="138" width="75" height="34" rx="6" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="107.5" y="155" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#CECBF6" font-family="system-ui, sans-serif">Fetch</text>
    <line x1="147" y1="155" x2="161" y2="155" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Decode -->
  <g class="anim a3">
    <rect x="163" y="138" width="75" height="34" rx="6" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="200.5" y="155" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#CECBF6" font-family="system-ui, sans-serif">Decode</text>
    <line x1="240" y1="155" x2="254" y2="155" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Stack -->
  <g class="anim a4">
    <rect x="256" y="138" width="75" height="34" rx="6" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="293.5" y="155" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#CECBF6" font-family="system-ui, sans-serif">Stack</text>
    <line x1="333" y1="155" x2="347" y2="155" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Args -->
  <g class="anim a5">
    <rect x="349" y="138" width="75" height="34" rx="6" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="386.5" y="155" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#CECBF6" font-family="system-ui, sans-serif">Args</text>
    <line x1="426" y1="155" x2="440" y2="155" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Execute -->
  <g class="anim a6">
    <rect x="442" y="138" width="75" height="34" rx="6" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="479.5" y="155" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#CECBF6" font-family="system-ui, sans-serif">Execute</text>
    <line x1="519" y1="155" x2="533" y2="155" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Return -->
  <g class="anim a7">
    <rect x="535" y="138" width="75" height="34" rx="6" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="572.5" y="155" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#CECBF6" font-family="system-ui, sans-serif">Return</text>
  </g>

  <!-- Fork arrows -->
  <g class="anim a8">
    <path d="M 340 190 L 340 210 L 200 210 L 200 228" fill="none" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
    <path d="M 340 190 L 340 210 L 480 210 L 480 228" fill="none" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Heat radiates out -->
  <g class="anim a9">
    <rect x="40" y="230" width="280" height="110" rx="12" fill="#262624" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
    <text x="56" y="250" dominant-baseline="central" font-size="14" font-weight="500" fill="#FAF9F5" font-family="system-ui, sans-serif">Heat radiates out</text>
    <text x="56" y="268" dominant-baseline="central" font-size="12" fill="#C2C0B6" font-family="system-ui, sans-serif">the room warms</text>
    <rect x="60" y="288" width="50" height="34" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
    <text x="85" y="305" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#F5C4B3" font-family="system-ui, sans-serif">Die</text>
    <line x1="112" y1="305" x2="118" y2="305" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="120" y="288" width="50" height="34" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
    <text x="145" y="305" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#F5C4B3" font-family="system-ui, sans-serif">Paste</text>
    <line x1="172" y1="305" x2="178" y2="305" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="180" y="288" width="50" height="34" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
    <text x="205" y="305" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#F5C4B3" font-family="system-ui, sans-serif">Sink</text>
    <line x1="232" y1="305" x2="238" y2="305" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="240" y="288" width="50" height="34" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
    <text x="265" y="305" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#F5C4B3" font-family="system-ui, sans-serif">Air</text>
  </g>

  <!-- Power drawn in -->
  <g class="anim a9">
    <rect x="360" y="230" width="280" height="110" rx="12" fill="#262624" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
    <text x="376" y="250" dominant-baseline="central" font-size="14" font-weight="500" fill="#FAF9F5" font-family="system-ui, sans-serif">Power drawn in</text>
    <text x="376" y="268" dominant-baseline="central" font-size="12" fill="#C2C0B6" font-family="system-ui, sans-serif">fuel burns, turbines spin</text>
    <rect x="380" y="288" width="50" height="34" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
    <text x="405" y="305" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#F5C4B3" font-family="system-ui, sans-serif">PSU</text>
    <line x1="438" y1="305" x2="432" y2="305" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="440" y="288" width="50" height="34" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
    <text x="465" y="305" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#F5C4B3" font-family="system-ui, sans-serif">Wall</text>
    <line x1="498" y1="305" x2="492" y2="305" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="500" y="288" width="50" height="34" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
    <text x="525" y="305" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#F5C4B3" font-family="system-ui, sans-serif">Grid</text>
    <line x1="558" y1="305" x2="552" y2="305" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="560" y="288" width="50" height="34" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
    <text x="585" y="305" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#F5C4B3" font-family="system-ui, sans-serif">Fuel</text>
  </g>

  <!-- Merge arrows -->
  <g class="anim a10">
    <path d="M 200 340 L 200 362 L 340 362" fill="none" stroke="#9C9A92" stroke-width="1.5"/>
    <path d="M 480 340 L 480 362 L 340 362" fill="none" stroke="#9C9A92" stroke-width="1.5"/>
    <line x1="340" y1="362" x2="340" y2="378" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Over billions of calls -->
  <g class="anim a11">
    <rect x="40" y="380" width="600" height="112" rx="12" fill="#262624" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
    <text x="56" y="400" dominant-baseline="central" font-size="14" font-weight="500" fill="#FAF9F5" font-family="system-ui, sans-serif">Over billions of calls</text>
    <text x="56" y="418" dominant-baseline="central" font-size="12" fill="#C2C0B6" font-family="system-ui, sans-serif">the silicon ages</text>
    <rect x="68" y="440" width="125" height="34" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
    <text x="130.5" y="457" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#F5C4B3" font-family="system-ui, sans-serif">Electromigration</text>
    <rect x="208" y="440" width="125" height="34" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
    <text x="270.5" y="457" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#F5C4B3" font-family="system-ui, sans-serif">Hot carriers</text>
    <rect x="348" y="440" width="125" height="34" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
    <text x="410.5" y="457" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#F5C4B3" font-family="system-ui, sans-serif">Capacitor wear</text>
    <rect x="488" y="440" width="125" height="34" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
    <text x="550.5" y="457" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#F5C4B3" font-family="system-ui, sans-serif">Solder fatigue</text>
  </g>
</svg>

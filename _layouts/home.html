---
layout: default
---

<div class="home">
  {{ content }}

  {%- if site.posts.size > 0 -%}
  <ul class="post-list">
    {%- for post in site.posts -%}
    <li>
      <span class="post-date">{{ post.date | date: "%-d %b %Y" }}</span>
      <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
    </li>
    {%- endfor -%}
  </ul>
  {%- endif -%}
</div>
